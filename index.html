<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pain Radar — 痛點偵測工具</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0c; --bg2: #141414; --bg3: #1c1c1c;
  --border: #242424; --border2: #303030;
  --text: #e8e8e8; --text2: #888; --text3: #444;
  --accent: #c8f542; --accent2: rgba(200,245,66,0.08);
  --red: #f87171; --blue: #60a5fa; --amber: #fbbf24; --green: #4ade80;
  --mono: 'DM Mono', monospace; --sans: 'Noto Sans TC', sans-serif; --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; }
.header { border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: .12em; text-transform: uppercase; }
.logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.layout { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 61px); }
.sidebar { border-right: 1px solid var(--border); padding: 24px 20px; }
.sidebar-section { margin-bottom: 24px; }
.sidebar-label { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 5px; font-family: var(--mono); }
.field input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 13px; padding: 9px 12px; font-family: var(--sans); outline: none; transition: border-color .15s; }
.field input:focus { border-color: var(--border2); }
.field input::placeholder { color: var(--text3); }
.btn-search { width: 100%; padding: 11px; background: var(--accent); color: #0c0c0c; font-size: 13px; font-weight: 500; font-family: var(--sans); border: none; border-radius: var(--radius); cursor: pointer; transition: opacity .15s; margin-top: 8px; }
.btn-search:hover { opacity: .85; }
.btn-search:disabled { opacity: .4; cursor: not-allowed; }
.sidebar-note { font-size: 11px; color: var(--text3); line-height: 1.6; margin-top: 16px; padding: 10px; background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--border); }
.main { overflow-y: auto; }
.main-inner { padding: 28px 32px; max-width: 960px; }
.empty { text-align: center; padding: 80px 40px; }
.empty-icon { font-family: var(--mono); font-size: 48px; color: var(--text3); margin-bottom: 16px; }
.empty-title { font-size: 16px; color: var(--text2); margin-bottom: 8px; }
.empty-sub { font-size: 13px; color: var(--text3); line-height: 1.7; }
.section { margin-bottom: 32px; }
.section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.section-title { font-size: 13px; font-weight: 500; color: var(--text); font-family: var(--mono); letter-spacing: .04em; }
.section-count { font-family: var(--mono); font-size: 11px; color: var(--text3); background: var(--bg3); padding: 2px 8px; border-radius: 20px; }
.place-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
.place-header { padding: 14px 16px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; cursor: pointer; }
.place-header:hover { background: var(--bg3); }
.place-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.place-meta { font-size: 11px; color: var(--text2); display: flex; gap: 10px; }
.rating { color: var(--amber); }
.btn-analyze { background: var(--accent2); border: 1px solid rgba(200,245,66,.3); color: var(--accent); font-size: 11px; font-family: var(--mono); padding: 5px 12px; border-radius: var(--radius); cursor: pointer; white-space: nowrap; transition: all .15s; }
.btn-analyze:hover { background: rgba(200,245,66,.15); }
.btn-analyze:disabled { opacity: .4; cursor: not-allowed; }
.place-reviews { border-top: 1px solid var(--border); }
.review-item { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.review-item:last-child { border-bottom: none; }
.review-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.review-stars { color: var(--amber); font-size: 11px; }
.review-date { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.review-text { font-size: 12px; color: var(--text2); line-height: 1.7; }
.ai-analysis { margin: 0 16px 14px; background: rgba(200,245,66,.04); border: 1px solid rgba(200,245,66,.15); border-radius: var(--radius); padding: 14px; }
.ai-label { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: .08em; margin-bottom: 10px; }
.ai-pain-item { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
.ai-pain-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin-top: 6px; flex-shrink: 0; }
.ai-pain-text { font-size: 12px; color: var(--text2); line-height: 1.6; }
.ai-pain-tag { display: inline-block; font-size: 10px; font-family: var(--mono); background: rgba(200,245,66,.1); color: var(--accent); padding: 1px 7px; border-radius: 20px; margin-left: 6px; }
.trends-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.trends-link { font-family: var(--mono); font-size: 10px; color: var(--accent); text-decoration: none; display: inline-block; margin-top: 8px; }
.trends-link:hover { opacity: .7; }
.loading { display: flex; align-items: center; gap: 8px; color: var(--text3); font-family: var(--mono); font-size: 12px; padding: 16px 0; }
.spinner { width: 14px; height: 14px; border: 1.5px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.2); border-radius: var(--radius); padding: 10px 14px; font-size: 12px; color: var(--red); margin-bottom: 12px; }
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
  .main-inner { padding: 20px 16px; }
  .header { padding: 16px 20px; }
}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="logo">Pain Radar</div>
    <div class="logo-sub">痛點偵測工具 by Naxvo</div>
  </div>
  <div class="status-dot"></div>
</div>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">搜尋設定</div>
      <div class="field">
        <label>店家類型</label>
        <input type="text" id="biz-type" placeholder="例：醫美診所、美甲工作室" value="醫美診所" />
      </div>
      <div class="field">
        <label>城市</label>
        <input type="text" id="city" placeholder="例：台北、台中、高雄" value="台北" />
      </div>
      <div class="field">
        <label>Google Trends 關鍵字</label>
        <input type="text" id="trend-kw" placeholder="例：術後照顧、預約系統" />
      </div>
    </div>
    <button class="btn-search" id="search-btn" onclick="doSearch()">開始分析</button>
    <div class="sidebar-note">
      搜尋低評分評論 → AI 反推老闆痛點 → 找到你的商機
    </div>
  </aside>
  <main class="main">
    <div class="main-inner" id="results">
      <div class="empty">
        <div class="empty-icon">◎</div>
        <div class="empty-title">輸入店家類型開始分析</div>
        <div class="empty-sub">從 Google Maps 低評分評論<br>用 AI 反推商家營運痛點</div>
      </div>
    </div>
  </main>
</div>
<script>
const PROXY    = 'https://hquzchzcoygnmninemvp.supabase.co/functions/v1/fetch-proxy';
const AI_PROXY = 'https://hquzchzcoygnmninemvp.supabase.co/functions/v1/ai-autofill';
const ANON     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxdXpjaHpjb3lnbm1uaW5lbXZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNzIwMjQsImV4cCI6MjA5NDc0ODAyNH0.igTevzpprg0W_tb3FgcVt5gILcONWMG1jYAW_p7GhYk';

async function callProxy(type, params) {
  const res = await fetch(PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ANON}` },
    body: JSON.stringify({ type, params }),
  });
  return res.json();
}

async function doSearch() {
  const bizType = document.getElementById('biz-type').value.trim();
  const city    = document.getElementById('city').value.trim();
  const trendKw = document.getElementById('trend-kw').value.trim();
  if (!bizType) { document.getElementById('biz-type').focus(); return; }

  const btn = document.getElementById('search-btn');
  btn.disabled = true; btn.textContent = '搜尋中...';
  document.getElementById('results').innerHTML = '';

  await Promise.allSettled([
    fetchMaps(bizType, city),
    trendKw ? Promise.resolve(showTrends(trendKw)) : Promise.resolve(),
  ]);

  btn.disabled = false; btn.textContent = '開始分析';
}

function appendSection(id, title, badge, content) {
  const results = document.getElementById('results');
  let section = document.getElementById('section-' + id);
  if (!section) {
    section = document.createElement('div');
    section.className = 'section'; section.id = 'section-' + id;
    section.innerHTML = `<div class="section-header"><div class="section-title">${title}</div><div class="section-count" id="count-${id}">${badge}</div></div><div id="body-${id}"></div>`;
    results.appendChild(section);
  } else {
    document.getElementById('count-' + id).textContent = badge;
  }
  document.getElementById('body-' + id).innerHTML = content;
}

function showLoading(id, title) {
  appendSection(id, title, '載入中', `<div class="loading"><div class="spinner"></div>搜尋中...</div>`);
}

// ── Google Maps ───────────────────────────────────────────
async function fetchMaps(bizType, city) {
  showLoading('maps', `Google Maps — ${bizType} ${city}`);
  try {
    const query = `${city} ${bizType}`;
    const data = await callProxy('maps_search', { query });
    const places = data.places || [];
    if (!places.length) {
      appendSection('maps', `Google Maps — ${bizType}`, '0 筆', `<div class="error-msg">沒有找到相關店家，請換個關鍵字</div>`);
      return;
    }

    const html = places.map(p => {
      const stars = p.rating ? '★'.repeat(Math.round(p.rating)) + '☆'.repeat(5 - Math.round(p.rating)) : '';
      return `<div class="place-card" id="place-${esc(p.id)}">
        <div class="place-header">
          <div>
            <div class="place-name">${esc(p.displayName?.text || '')}</div>
            <div class="place-meta">
              <span class="rating">${stars} ${p.rating || '—'}</span>
              <span>${p.userRatingCount || 0} 則評論</span>
              <span>${esc(p.formattedAddress || '')}</span>
            </div>
          </div>
          <button class="btn-analyze" onclick="analyzePlace('${esc(p.id)}', '${esc(p.displayName?.text || '')}', '${esc(bizType)}')">
            ✦ AI 分析痛點
          </button>
        </div>
        <div id="analysis-${esc(p.id)}"></div>
      </div>`;
    }).join('');

    appendSection('maps', `Google Maps — ${bizType} ${city}`, `${places.length} 間店家`, html);
  } catch(e) {
    appendSection('maps', `Google Maps`, '錯誤', `<div class="error-msg">載入失敗：${e.message}</div>`);
  }
}

// ── AI 分析痛點 ───────────────────────────────────────────
async function analyzePlace(placeId, placeName, bizType) {
  const container = document.getElementById(`analysis-${placeId}`);
  const btn = document.querySelector(`#place-${placeId} .btn-analyze`);
  if (!container || !btn) return;

  btn.disabled = true; btn.textContent = '分析中...';
  container.innerHTML = `<div class="loading" style="padding:12px 16px;"><div class="spinner"></div>抓取評論並分析中...</div>`;

  try {
    // 抓評論
    const data = await callProxy('maps_reviews', { place_id: placeId });
    const reviews = data.reviews || [];

    if (!reviews.length) {
      container.innerHTML = `<div style="padding:12px 16px;font-size:12px;color:var(--text3);">這間店沒有公開評論</div>`;
      btn.disabled = false; btn.textContent = '✦ AI 分析痛點';
      return;
    }

    // 只取低評分（1-3星）
    const lowReviews = reviews.filter(r => (r.rating || 5) <= 3);
    const allReviews = lowReviews.length > 0 ? lowReviews : reviews.slice(0, 5);

    // 顯示評論
    const reviewHtml = allReviews.slice(0, 5).map(r => {
      const stars = '★'.repeat(r.rating||5) + '☆'.repeat(5-(r.rating||5));
      const text = r.text?.text || r.originalText?.text || '（無文字評論）';
      return `<div class="review-item">
        <div class="review-meta">
          <span class="review-stars">${stars}</span>
          <span class="review-date">${r.relativePublishTimeDescription || ''}</span>
        </div>
        <div class="review-text">${esc(text)}</div>
      </div>`;
    }).join('');

    // 呼叫 AI 分析（透過 Edge Function）
    const reviewTexts = allReviews.map(r => `${r.rating}星：${r.text?.text || r.originalText?.text || ''}`).join("\n");
    const aiData = await callProxy("analyze_reviews", {
      reviews: reviewTexts,
      bizType: bizType,
      placeName: placeName,
    });
    const result = aiData.analysis;
    let analysisHtml = '';
    if (result && typeof result === 'object') {
      const saasHtml = (result.proposed_micro_saas || []).map(s => `
        <div style="margin-top:10px;padding:10px 12px;background:var(--bg);border:1px solid rgba(200,245,66,.15);border-radius:6px;">
          <div style="font-size:12px;font-weight:500;color:var(--accent);margin-bottom:4px;">${esc(s.product_name||'')}</div>
          <div style="font-size:11.5px;color:var(--text2);margin-bottom:4px;">${esc(s.core_function||'')}</div>
          <div style="font-size:10.5px;color:var(--text3);font-family:var(--mono);">實作：${esc(s.implementation_logic||'')}</div>
        </div>`).join('');
      analysisHtml = `
        <div class="ai-pain-item" style="margin-bottom:8px;">
          <div class="ai-pain-dot"></div>
          <div class="ai-pain-text"><span class="ai-pain-tag">根本原因</span> ${esc(result.root_cause_analysis||'')}</div>
        </div>
        <div class="ai-pain-item">
          <div class="ai-pain-dot"></div>
          <div class="ai-pain-text"><span class="ai-pain-tag">老闆痛點</span> ${esc(result.owner_pain_point||'')}</div>
        </div>
        ${saasHtml}`;
    } else {
      analysisHtml = `<div class="ai-pain-item"><div class="ai-pain-dot"></div><div class="ai-pain-text">${esc(String(result||aiData.error||'分析失敗'))}</div></div>`;
    }

    container.innerHTML = `
      <div class="place-reviews">${reviewHtml}</div>
      <div class="ai-analysis">
        <div class="ai-label">✦ AI 反推老闆痛點與商機</div>
        ${analysisHtml}
      </div>`;

    btn.textContent = '✓ 已分析';
  } catch(e) {
    container.innerHTML = `<div style="padding:12px 16px;"><div class="error-msg">分析失敗：${e.message}</div></div>`;
    btn.disabled = false; btn.textContent = '✦ AI 分析痛點';
  }
}

// ── Google Trends ─────────────────────────────────────────
function showTrends(keyword) {
  const kw = encodeURIComponent(keyword);
  const url = `https://trends.google.com.tw/trends/explore?geo=TW&q=${kw}`;
  appendSection('trends', 'Google Trends（台灣）', '外部連結',
    `<div class="trends-card">
      <div style="font-size:13px;font-weight:500;color:var(--text);">查看「${esc(keyword)}」在台灣的搜尋趨勢</div>
      <div style="font-size:12px;color:var(--text2);margin-top:6px;">確認這個問題是否有足夠多的人在搜尋解法。</div>
      <a class="trends-link" href="${url}" target="_blank">前往 Google Trends 查看 →</a>
    </div>`
  );
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
document.getElementById('biz-type').addEventListener('keydown', e => { if (e.key==='Enter') doSearch(); });
</script>
</body>
</html>
