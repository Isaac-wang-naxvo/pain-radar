<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pain Radar — 痛點偵測工具</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0c; --bg2: #141414; --bg3: #1c1c1c;
  --border: #242424; --border2: #303030;
  --text: #e8e8e8; --text2: #888; --text3: #444;
  --accent: #c8f542; --accent2: rgba(200,245,66,0.08);
  --red: #f87171; --blue: #60a5fa; --amber: #fbbf24;
  --mono: 'DM Mono', monospace; --sans: 'Noto Sans TC', sans-serif; --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; }
.header { border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: .12em; text-transform: uppercase; }
.logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.layout { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 61px); }
.sidebar { border-right: 1px solid var(--border); padding: 24px 20px; }
.sidebar-section { margin-bottom: 24px; }
.sidebar-label { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 5px; font-family: var(--mono); }
.field input, .field select { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 13px; padding: 9px 12px; font-family: var(--sans); outline: none; transition: border-color .15s; }
.field input:focus, .field select:focus { border-color: var(--border2); }
.field input::placeholder { color: var(--text3); }
.field select option { background: var(--bg2); }
.source-toggles { display: flex; flex-direction: column; gap: 6px; }
.toggle-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all .15s; }
.toggle-item:hover { border-color: var(--border2); }
.toggle-item.active { border-color: var(--accent); background: var(--accent2); }
.toggle-label { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.toggle-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); }
.toggle-item.active .toggle-dot { background: var(--accent); }
.toggle-badge { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.toggle-item.active .toggle-badge { color: var(--accent); }
.btn-search { width: 100%; padding: 11px; background: var(--accent); color: #0c0c0c; font-size: 13px; font-weight: 500; font-family: var(--sans); border: none; border-radius: var(--radius); cursor: pointer; transition: opacity .15s; margin-top: 8px; }
.btn-search:hover { opacity: .85; }
.btn-search:disabled { opacity: .4; cursor: not-allowed; }
.main { overflow-y: auto; }
.main-inner { padding: 28px 32px; max-width: 900px; }
.empty { text-align: center; padding: 80px 40px; }
.empty-icon { font-family: var(--mono); font-size: 48px; color: var(--text3); margin-bottom: 16px; }
.empty-title { font-size: 16px; color: var(--text2); margin-bottom: 8px; }
.empty-sub { font-size: 13px; color: var(--text3); line-height: 1.7; }
.section { margin-bottom: 32px; }
.section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.section-title { font-size: 13px; font-weight: 500; color: var(--text); font-family: var(--mono); letter-spacing: .04em; }
.section-count { font-family: var(--mono); font-size: 11px; color: var(--text3); background: var(--bg3); padding: 2px 8px; border-radius: 20px; }
.post-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; transition: border-color .15s; }
.post-card:hover { border-color: var(--border2); }
.post-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.post-source { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 20px; }
.source-ptt { background: rgba(248,113,113,.1); color: var(--red); }
.source-dcard { background: rgba(96,165,250,.1); color: var(--blue); }
.source-maps { background: rgba(251,191,36,.1); color: var(--amber); }
.post-date { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.post-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; line-height: 1.5; }
.post-body { font-size: 12px; color: var(--text2); line-height: 1.7; }
.post-link { font-family: var(--mono); font-size: 10px; color: var(--accent); text-decoration: none; margin-top: 8px; display: inline-block; }
.post-link:hover { opacity: .7; }
.trends-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.trends-chart { height: 120px; display: flex; align-items: flex-end; gap: 3px; margin-top: 12px; }
.trends-bar { flex: 1; border-radius: 3px 3px 0 0; background: var(--accent2); border: 1px solid rgba(200,245,66,.15); transition: background .15s; min-height: 2px; position: relative; }
.trends-bar:hover { background: rgba(200,245,66,.2); }
.trends-bar .tip { display: none; position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--border2); border-radius: 4px; padding: 3px 7px; font-family: var(--mono); font-size: 10px; color: var(--text); white-space: nowrap; z-index: 10; }
.trends-bar:hover .tip { display: block; }
.trends-stat { display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
.trends-stat-item { font-size: 12px; color: var(--text2); }
.trends-stat-item span { font-family: var(--mono); }
.loading { display: flex; align-items: center; gap: 8px; color: var(--text3); font-family: var(--mono); font-size: 12px; padding: 16px 0; }
.spinner { width: 14px; height: 14px; border: 1.5px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.2); border-radius: var(--radius); padding: 10px 14px; font-size: 12px; color: var(--red); margin-bottom: 12px; }
.rating-stars { color: var(--amber); font-size: 11px; }
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
  .main-inner { padding: 20px 16px; }
  .header { padding: 16px 20px; }
}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="logo">Pain Radar</div>
    <div class="logo-sub">痛點偵測工具 by Naxvo</div>
  </div>
  <div class="status-dot"></div>
</div>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">搜尋關鍵字</div>
      <div class="field">
        <label>關鍵字</label>
        <input type="text" id="keyword" placeholder="例：術後追蹤、爽約" />
      </div>
      <div class="field">
        <label>產業別（選填）</label>
        <input type="text" id="industry" placeholder="例：醫美診所、美甲工作室" />
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">資料來源</div>
      <div class="source-toggles">
        <div class="toggle-item active" id="toggle-ptt" onclick="toggleSource('ptt')">
          <div class="toggle-label"><div class="toggle-dot"></div>PTT</div>
          <div class="toggle-badge">公開</div>
        </div>
        <div class="toggle-item active" id="toggle-dcard" onclick="toggleSource('dcard')">
          <div class="toggle-label"><div class="toggle-dot"></div>Dcard</div>
          <div class="toggle-badge">公開</div>
        </div>
        <div class="toggle-item active" id="toggle-maps" onclick="toggleSource('maps')">
          <div class="toggle-label"><div class="toggle-dot"></div>Google Maps</div>
          <div class="toggle-badge">1星評論</div>
        </div>
        <div class="toggle-item active" id="toggle-trends" onclick="toggleSource('trends')">
          <div class="toggle-label"><div class="toggle-dot"></div>Google Trends</div>
          <div class="toggle-badge">趨勢</div>
        </div>
      </div>
    </div>
    <button class="btn-search" id="search-btn" onclick="doSearch()">開始搜尋</button>
  </aside>
  <main class="main">
    <div class="main-inner" id="results">
      <div class="empty">
        <div class="empty-icon">◎</div>
        <div class="empty-title">輸入關鍵字開始偵測痛點</div>
        <div class="empty-sub">從 PTT、Dcard、Google Maps 一星評論<br>和 Google Trends 蒐集真實的市場討論</div>
      </div>
    </div>
  </main>
</div>
<script>
const PROXY = 'https://hquzchzcoygnmninemvp.supabase.co/functions/v1/fetch-proxy';
const ANON  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxdXpjaHpjb3lnbm1uaW5lbXZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNzIwMjQsImV4cCI6MjA5NDc0ODAyNH0.igTevzpprg0W_tb3FgcVt5gILcONWMG1jYAW_p7GhYk';

let sources = { ptt: true, dcard: true, maps: true, trends: true };

function toggleSource(s) {
  sources[s] = !sources[s];
  document.getElementById('toggle-' + s).classList.toggle('active', sources[s]);
}

async function callProxy(type, params) {
  const res = await fetch(PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ANON}` },
    body: JSON.stringify({ type, params }),
  });
  return res.json();
}

async function doSearch() {
  const keyword = document.getElementById('keyword').value.trim();
  if (!keyword) { document.getElementById('keyword').focus(); return; }
  const industry = document.getElementById('industry').value.trim();
  const btn = document.getElementById('search-btn');
  btn.disabled = true; btn.textContent = '搜尋中...';
  document.getElementById('results').innerHTML = '';
  const tasks = [];
  if (sources.ptt)    tasks.push(fetchPTT(keyword, industry));
  if (sources.dcard)  tasks.push(fetchDcard(keyword, industry));
  if (sources.maps)   tasks.push(fetchMaps(keyword, industry));
  if (sources.trends) tasks.push(fetchTrends(keyword));
  await Promise.allSettled(tasks);
  btn.disabled = false; btn.textContent = '開始搜尋';
  if (!document.getElementById('results').innerHTML.trim()) {
    document.getElementById('results').innerHTML = `<div class="error-msg">沒有找到結果，請換個關鍵字試試。</div>`;
  }
}

function appendSection(id, title, badge, content) {
  const results = document.getElementById('results');
  let section = document.getElementById('section-' + id);
  if (!section) {
    section = document.createElement('div');
    section.className = 'section'; section.id = 'section-' + id;
    section.innerHTML = `<div class="section-header"><div class="section-title">${title}</div><div class="section-count" id="count-${id}">${badge}</div></div><div id="body-${id}"></div>`;
    results.appendChild(section);
  } else {
    document.getElementById('count-' + id).textContent = badge;
  }
  document.getElementById('body-' + id).innerHTML = content;
}

function showLoading(id, title) {
  appendSection(id, title, '載入中', `<div class="loading"><div class="spinner"></div>搜尋中...</div>`);
}

async function fetchPTT(keyword, industry) {
  showLoading('ptt', 'PTT');
  try {
    const q = industry ? `${keyword} ${industry}` : keyword;
    const data = await callProxy('ptt', { keyword: q });
    const posts = data.posts || [];
    if (!posts.length) { appendSection('ptt', 'PTT', '0 筆', `<div class="error-msg">PTT 沒有找到相關貼文</div>`); return; }
    const html = posts.slice(0, 8).map(p => `
      <div class="post-card">
        <div class="post-meta"><span class="post-source source-ptt">PTT</span><span class="post-date">${p.date}</span></div>
        <div class="post-title">${esc(p.title)}</div>
        <a class="post-link" href="${p.url}" target="_blank">閱讀原文 →</a>
      </div>`).join('');
    appendSection('ptt', 'PTT', `${posts.length} 筆`, html);
  } catch(e) { appendSection('ptt', 'PTT', '錯誤', `<div class="error-msg">PTT 載入失敗：${e.message}</div>`); }
}

async function fetchDcard(keyword, industry) {
  showLoading('dcard', 'Dcard');
  try {
    const q = industry ? `${keyword} ${industry}` : keyword;
    const data = await callProxy('dcard', { keyword: q });
    const posts = Array.isArray(data) ? data : (data.data || []);
    if (!posts.length) { appendSection('dcard', 'Dcard', '0 筆', `<div class="error-msg">Dcard 沒有找到相關貼文</div>`); return; }
    const html = posts.slice(0, 8).map(p => {
      const date = p.createdAt ? new Date(p.createdAt).toLocaleDateString('zh-TW') : '';
      const excerpt = (p.excerpt || p.content || '').slice(0, 120);
      return `<div class="post-card">
        <div class="post-meta"><span class="post-source source-dcard">Dcard</span><span class="post-date">${date}</span></div>
        <div class="post-title">${esc(p.title || '')}</div>
        ${excerpt ? `<div class="post-body">${esc(excerpt)}...</div>` : ''}
        <a class="post-link" href="https://www.dcard.tw/f/all/p/${p.id}" target="_blank">閱讀原文 →</a>
      </div>`;
    }).join('');
    appendSection('dcard', 'Dcard', `${posts.length} 筆`, html);
  } catch(e) { appendSection('dcard', 'Dcard', '錯誤', `<div class="error-msg">Dcard 載入失敗：${e.message}</div>`); }
}

async function fetchMaps(keyword, industry) {
  showLoading('maps', 'Google Maps 一星評論');
  try {
    const query = industry ? `${industry} ${keyword}` : keyword;
    const searchData = await callProxy('maps_search', { query });
    const places = (searchData.results || []).slice(0, 5);
    if (!places.length) { appendSection('maps', 'Google Maps 一星評論', '0 筆', `<div class="error-msg">Maps 沒有找到相關店家</div>`); return; }
    const reviews = [];
    for (const place of places) {
      try {
        const detail = await callProxy('maps_detail', { place_id: place.place_id });
        const lowReviews = (detail.result?.reviews || []).filter(r => r.rating <= 2);
        lowReviews.forEach(r => reviews.push({ ...r, place_name: place.name }));
      } catch(e) {}
    }
    if (!reviews.length) { appendSection('maps', 'Google Maps 一星評論', '0 筆', `<div class="error-msg">沒有找到低評分評論</div>`); return; }
    const html = reviews.slice(0, 8).map(r => {
      const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
      return `<div class="post-card">
        <div class="post-meta"><span class="post-source source-maps">Maps</span><span class="rating-stars">${stars}</span><span class="post-date">${r.rating}星</span></div>
        <div class="post-title" style="font-size:12px;color:var(--text2);font-weight:400;">${esc(r.place_name)}</div>
        <div class="post-body">${esc(r.text || '')}</div>
      </div>`;
    }).join('');
    appendSection('maps', 'Google Maps 一星評論', `${reviews.length} 筆`, html);
  } catch(e) { appendSection('maps', 'Google Maps 一星評論', '錯誤', `<div class="error-msg">Maps 載入失敗：${e.message}</div>`); }
}

async function fetchTrends(keyword) {
  showLoading('trends', 'Google Trends（台灣）');
  try {
    const data = await callProxy('trends', { keyword });
    const timeline = data.default?.timelineData || [];
    if (!timeline.length) throw new Error('無趨勢資料');
    const values = timeline.map(t => t.value[0]);
    const max = Math.max(...values) || 1;
    const avg = Math.round(values.reduce((a,b) => a+b,0) / values.length);
    const recent = values.slice(-4);
    const recentAvg = Math.round(recent.reduce((a,b)=>a+b,0)/recent.length);
    const trend = recentAvg > avg ? '↑ 上升中' : recentAvg < avg ? '↓ 下降中' : '→ 持平';
    const trendColor = recentAvg > avg ? 'var(--accent)' : recentAvg < avg ? 'var(--red)' : 'var(--text2)';
    const bars = values.map((v,i) => {
      const h = Math.round((v/max)*100);
      const label = timeline[i]?.formattedAxisTime || '';
      return `<div class="trends-bar" style="height:${Math.max(h,1)}%"><div class="tip">${label}: ${v}</div></div>`;
    }).join('');
    const html = `<div class="trends-wrap">
      <div class="trends-stat">
        <div class="trends-stat-item">趨勢 <span style="color:${trendColor}">${trend}</span></div>
        <div class="trends-stat-item">近期平均 <span>${recentAvg}</span></div>
        <div class="trends-stat-item">整體平均 <span>${avg}</span></div>
      </div>
      <div class="trends-chart">${bars}</div>
    </div>`;
    appendSection('trends', 'Google Trends（台灣）', '過去12個月', html);
  } catch(e) {
    const kw = encodeURIComponent(document.getElementById('keyword').value);
    appendSection('trends', 'Google Trends（台灣）', '錯誤', `<div class="error-msg">Trends 載入失敗。請直接前往 <a href="https://trends.google.com.tw/trends/explore?geo=TW&q=${kw}" target="_blank" style="color:var(--accent)">Google Trends →</a></div>`);
  }
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
document.getElementById('keyword').addEventListener('keydown', e => { if (e.key==='Enter') doSearch(); });
</script>
</body>
</html>
